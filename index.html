<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>100 天泰文 A1 </title>


  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'nonce-3f9b2c7a' 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">

  <style>
    :root{
      --bg:#f7fafc; --card:#ffffff; --accent:#0ea5e9; --muted:#6b7280; --danger:#ef4444;
      --radius:12px; --gap:12px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, Roboto, Arial;
      background:var(--bg); color:#0f172a; -webkit-font-smoothing:antialiased;
      padding:12px;
    }
    header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    header h1{font-size:18px;margin:0}
    header p{margin:0;color:var(--muted);font-size:13px}
    .layout{display:grid;grid-template-columns:1fr;gap:12px}
    .card{background:var(--card);border-radius:var(--radius);padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
    .top-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .progress-wrap{flex:1;min-width:120px}
    .progress{background:#e6f6ff;border-radius:999px;height:10px;overflow:hidden}
    .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#6c5ce7);width:0%;transition:width .25s}
    .small{font-size:13px;color:var(--muted)}
    .btn{background:var(--accent);color:#fff;border:none;padding:10px 12px;border-radius:10px;font-size:14px;cursor:pointer}
    .btn.ghost{background:#fff;color:var(--accent);border:1px solid rgba(14,165,233,0.12)}
    .btn.warn{background:var(--danger)}
    .search{flex:1;padding:10px;border-radius:10px;border:1px solid #e6eefc;font-size:14px}
    .table-wrap{overflow:auto;border-radius:10px;border:1px solid #eef2ff;max-height:44vh}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid #f3f6fb;text-align:left}
    th{position:sticky;top:0;background:#fff;z-index:2}
    tr.done td{background:rgba(34,197,94,0.04)}
    .day{width:72px;font-weight:700}
    .task{min-width:220px}
    .checkbox{text-align:center;width:64px}
    .vcard{display:flex;flex-direction:column;gap:8px}
    .form-row{display:flex;gap:8px;flex-wrap:wrap}
    input[type="text"], select, textarea{padding:10px;border-radius:10px;border:1px solid #e6eefc;font-size:14px}
    textarea{min-height:72px;resize:vertical}
    .word-list{max-height:36vh;overflow:auto;border-radius:10px;border:1px solid #eef2ff;padding:8px;background:#fff}
    .word-item{display:flex;align-items:flex-start;gap:8px;padding:8px;border-bottom:1px solid #f3f6fb}
    .word-main{font-weight:700}
    .word-sub{font-size:13px;color:var(--muted)}
    .word-actions{margin-left:auto;display:flex;gap:6px}
    .pill{background:#eef2ff;color:var(--accent);padding:6px 10px;border-radius:999px;font-size:13px}
    .bottom-bar{
      position:fixed;left:12px;right:12px;bottom:12px;background:linear-gradient(180deg,#fff,#f8fafc);
      border-radius:14px;padding:8px;display:flex;gap:8px;align-items:center;box-shadow:0 10px 30px rgba(2,6,23,0.12);
      z-index:60;
    }
    .bottom-bar .btn{flex:1;padding:12px;border-radius:10px;font-size:15px}
    @media(min-width:980px){
      .layout{grid-template-columns:1fr 420px}
      .table-wrap{max-height:60vh}
      .word-list{max-height:46vh}
      .bottom-bar{display:none}
    }
    /* accessibility focus */
    :focus{outline:3px solid rgba(14,165,233,0.18);outline-offset:2px}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>100 天泰文 A1（安全版）</h1>
      <p class="small">手機友善、單字匯出（CSV）、可選本機加密。請勿儲存敏感憑證於此頁面。</p>
    </div>
  </header>

  <main class="layout">
    <!-- 計劃表 -->
    <section class="card" aria-label="計劃表">
      <div class="top-row" style="margin-bottom:8px">
        <div class="progress-wrap">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
            <div class="small" id="progressText">0 / 100 完成</div>
          </div>
        </div>
        <button class="btn" id="markAll">全部完成</button>
        <button class="btn ghost" id="clearAll">重設</button>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="searchInput" class="search" placeholder="搜尋 Day 或 任務">
      </div>

      <div class="table-wrap" role="region" aria-label="100 天計劃表">
        <table id="planTable">
          <thead>
            <tr><th class="day">Day</th><th class="task">任務</th><th class="checkbox">完成</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <div class="small" id="lastSaved">尚未儲存</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="small">已完成 <strong id="doneCount">0</strong></div>
          <div class="small">剩餘 <strong id="leftCount">100</strong></div>
        </div>
      </div>
    </section>

    <!-- 單字庫 -->
    <aside class="card vcard" aria-label="單字庫">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>單字庫</strong>
          <div class="small">新增 / 編輯 / 匯出（CSV） / 本機加密（選用）</div>
        </div>
        <div class="pill" id="totalWords">0 字</div>
      </div>

      <div style="margin-top:8px">
        <div class="form-row" style="margin-bottom:8px">
          <select id="selectDay" aria-label="選擇 Day"></select>
          <input id="inputThai" type="text" placeholder="泰文單字（必填）" inputmode="text" />
        </div>
        <div class="form-row" style="margin-bottom:8px">
          <input id="inputMeaning" type="text" placeholder="中文或英文詞義（選填）" />
        </div>
        <div style="margin-bottom:8px">
          <textarea id="inputNote" placeholder="備註（發音、例句）"></textarea>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="btn" id="addWordBtn">新增單字</button>
          <button class="btn ghost" id="clearForm">清除</button>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="wordSearch" class="search" placeholder="搜尋單字或備註" />
        </div>

        <div class="word-list" id="wordList" aria-live="polite"></div>

        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <button class="btn ghost" id="showAllWords">顯示全部</button>
          <button class="btn ghost" id="deleteAllWords">刪除全部</button>
          <button class="btn" id="exportDayCsv">匯出當日 CSV</button>
          <button class="btn" id="exportAllCsv">匯出全部 CSV</button>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="small">顯示 Day <span id="currentDayLabel">1</span></div>
          <div style="display:flex;gap:8px;align-items:center">
            <label class="small" for="enableEncrypt">本機加密</label>
            <input id="enableEncrypt" type="checkbox" aria-label="啟用本機加密">
            <input id="encryptPass" type="password" placeholder="輸入加密密碼（短期）" style="padding:8px;border-radius:8px;border:1px solid #e6eefc">
          </div>
        </div>
      </div>
    </aside>
  </main>

  <div class="bottom-bar" role="toolbar" aria-label="快速操作">
    <button class="btn" id="quickAdd">新增單字</button>
    <button class="btn ghost" id="quickExport">匯出當日 CSV</button>
  </div>

  <!--
    注意：
    - 此檔案使用 CSP nonce '3f9b2c7a'（與 meta 中一致）允許此內嵌 script 執行。
    - 若部署到伺服器，請改由伺服器動態產生 nonce 並在 HTTP header 設定 CSP。
    - 不要在此頁面儲存任何敏感憑證（密碼、JWT、API key）。本機加密僅保護資料在裝置上的可讀性，若裝置被攻破仍有風險。
  -->
  <script nonce="3f9b2c7a">
    'use strict';

    /* -------------------------
       設定與任務產生
       ------------------------- */
    const taskRanges = [
      {from:1,to:5, text:"學 5 個子音，練筆順 + 聽音檔"},
      {from:6,to:10, text:"學 5 個子音，練習組合音"},
      {from:11,to:15, text:"學 5 個母音，練習發音"},
      {from:16,to:20, text:"熟悉 5 種聲調，練習打招呼與自我介紹"},
      {from:21,to:25, text:"學數字 1–100，練習問時間"},
      {from:26,to:30, text:"數字與時間練習，造句表示時間"},
      {from:31,to:35, text:"家庭成員詞彙，造句我有/沒有..."},
      {from:36,to:40, text:"日常動詞（吃、去、看），造句練習"},
      {from:41,to:45, text:"食物詞彙與顏色，認讀菜單常見字"},
      {from:46,to:50, text:"購物用語，模擬問價錢與砍價"},
      {from:51,to:55, text:"交通工具詞彙，學方向與地點詞"},
      {from:56,to:60, text:"問路句型，模擬問路與指路練習"},
      {from:61,to:65, text:"餐廳點餐句型，練習點餐與要求"},
      {from:66,to:70, text:"菜單閱讀與常見料理詞彙練習"},
      {from:71,to:75, text:"常用句型整合：我想要... 我喜歡..."},
      {from:76,to:80, text:"情境對話練習：市場、藥局、車站"},
      {from:81,to:85, text:"閱讀短句與標誌，練習發音與理解"},
      {from:86,to:90, text:"寫作練習：寫 3 個單字與 1 句短句"},
      {from:91,to:99, text:"模擬完整情境：購物、問路、餐廳"},
      {from:100,to:100, text:"Day 100 模擬測驗：自我介紹 + 問路 + 點餐"}
    ];
    function getTaskForDay(d){
      for(const r of taskRanges) if(d>=r.from && d<=r.to) return r.text;
      return "每日複習：字母、詞彙、聽力模仿";
    }

    /* -------------------------
       localStorage keys & state
       ------------------------- */
    const PLAN_KEY = 'thai100_progress_v1';
    const WORDS_KEY = 'thai100_words_v1_encrypted'; // 若啟用加密，會存放加密 blob；否則存放明文 JSON under WORDS_KEY_plain
    const WORDS_KEY_PLAIN = 'thai100_words_v1_plain';

    let planState = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
    if(!Array.isArray(planState.days) || planState.days.length !== 100){
      planState.days = Array(100).fill(false);
      planState.lastSaved = null;
    }

    // wordsState: in-memory plain JS object { words: [...] }
    let wordsState = { words: [] };

    // load plain or encrypted on init
    (function loadWordsOnStart(){
      // if encrypted blob exists, we keep it but do not decrypt until user provides passphrase
      const encrypted = localStorage.getItem(WORDS_KEY);
      const plain = localStorage.getItem(WORDS_KEY_PLAIN);
      if(plain){
        try { wordsState = JSON.parse(plain); if(!Array.isArray(wordsState.words)) wordsState = { words: [] }; }
        catch(e){ wordsState = { words: [] }; }
      } else if(encrypted){
        // keep wordsState empty until user decrypts
        wordsState = { words: [] };
      } else {
        wordsState = { words: [] };
      }
    })();

    /* -------------------------
       DOM refs
       ------------------------- */
    const tbody = document.getElementById('tableBody');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const doneCountEl = document.getElementById('doneCount');
    const leftCountEl = document.getElementById('leftCount');
    const lastSavedEl = document.getElementById('lastSaved');
    const searchInput = document.getElementById('searchInput');

    const selectDay = document.getElementById('selectDay');
    const inputThai = document.getElementById('inputThai');
    const inputMeaning = document.getElementById('inputMeaning');
    const inputNote = document.getElementById('inputNote');
    const addWordBtn = document.getElementById('addWordBtn');
    const clearFormBtn = document.getElementById('clearForm');
    const wordList = document.getElementById('wordList');
    const totalWords = document.getElementById('totalWords');
    const currentDayLabel = document.getElementById('currentDayLabel');
    const wordSearch = document.getElementById('wordSearch');
    const showAllWordsBtn = document.getElementById('showAllWords');
    const deleteAllWordsBtn = document.getElementById('deleteAllWords');
    const exportDayCsvBtn = document.getElementById('exportDayCsv');
    const exportAllCsvBtn = document.getElementById('exportAllCsv');
    const quickAdd = document.getElementById('quickAdd');
    const quickExport = document.getElementById('quickExport');
    const enableEncrypt = document.getElementById('enableEncrypt');
    const encryptPass = document.getElementById('encryptPass');

    // populate day select
    for(let i=1;i<=100;i++){
      const opt = document.createElement('option'); opt.value = i; opt.textContent = 'Day ' + i;
      selectDay.appendChild(opt);
    }

    /* -------------------------
       安全工具函式（輸入消毒、避免 innerHTML）
       - 所有使用者輸入在顯示時使用 textContent 或經過 escapeHTML
       ------------------------- */
    function escapeHTML(s){
      if(s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 產生唯一 id
    function uid(){ return 'w_' + Math.random().toString(36).slice(2,9); }

    /* -------------------------
       Plan table 渲染與操作
       ------------------------- */
    function renderTable(filter=''){
      tbody.innerHTML = '';
      for(let i=1;i<=100;i++){
        const tr = document.createElement('tr');
        const done = !!planState.days[i-1];
        if(done) tr.classList.add('done');

        const tdDay = document.createElement('td'); tdDay.className='day'; tdDay.textContent='Day ' + i;
        const tdTask = document.createElement('td'); tdTask.className='task'; tdTask.textContent=getTaskForDay(i);
        const tdCheck = document.createElement('td'); tdCheck.className='checkbox';
        const input = document.createElement('input'); input.type='checkbox'; input.checked = done; input.dataset.day = i;
        input.addEventListener('change', onToggle);
        tdCheck.appendChild(input);

        tr.addEventListener('click', (e)=>{
          if(e.target.tagName.toLowerCase() === 'input') return;
          selectDay.value = i; currentDayLabel.textContent = i; renderWordList();
          document.querySelector('.vcard').scrollIntoView({behavior:'smooth',block:'center'});
        });

        const rowText = (tdDay.textContent + ' ' + tdTask.textContent).toLowerCase();
        if(filter && !rowText.includes(filter.toLowerCase())) tr.style.display='none';

        tr.appendChild(tdDay); tr.appendChild(tdTask); tr.appendChild(tdCheck);
        tbody.appendChild(tr);
      }
      updateStats();
    }

    function onToggle(e){
      const day = Number(e.target.dataset.day);
      planState.days[day-1] = e.target.checked;
      savePlanState();
      const row = e.target.closest('tr');
      if(e.target.checked) row.classList.add('done'); else row.classList.remove('done');
      updateStats();
    }

    function savePlanState(){
      planState.lastSaved = new Date().toISOString();
      try {
        localStorage.setItem(PLAN_KEY, JSON.stringify(planState));
        lastSavedEl.textContent = '最後儲存：' + new Date(planState.lastSaved).toLocaleString();
      } catch(e){
        console.error('儲存計劃失敗', e);
      }
    }

    function updateStats(){
      const doneCount = planState.days.filter(Boolean).length;
      doneCountEl.textContent = doneCount;
      leftCountEl.textContent = 100 - doneCount;
      progressText.textContent = `${doneCount} / 100 完成`;
      progressBar.style.width = (doneCount) + '%';
    }

    document.getElementById('markAll').addEventListener('click', ()=>{
      if(!confirm('確定要將所有天數標為完成嗎？')) return;
      planState.days = planState.days.map(()=>true);
      savePlanState(); renderTable(searchInput.value.trim());
    });
    document.getElementById('clearAll').addEventListener('click', ()=>{
      if(!confirm('確定要重設所有打卡紀錄？')) return;
      planState.days = planState.days.map(()=>false);
      savePlanState(); renderTable(searchInput.value.trim());
    });
    searchInput.addEventListener('input', (e)=> renderTable(e.target.value.trim()));

    /* -------------------------
       單字功能（明文操作，儲存時視加密設定決定是否加密）
       - 所有顯示使用 textContent（或 escapeHTML）避免 XSS
       ------------------------- */
    function saveWordsPlain(){
      try {
        localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
        updateWordStats();
      } catch(e){ console.error('儲存單字失敗', e); }
    }

    function updateWordStats(){ totalWords.textContent = `${wordsState.words.length} 字`; }

    addWordBtn.addEventListener('click', addWord);
    quickAdd.addEventListener('click', addWord);
    function addWord(){
      const thai = inputThai.value.trim();
      if(!thai){ alert('請輸入泰文單字'); inputThai.focus(); return; }
      const meaning = inputMeaning.value.trim();
      const note = inputNote.value.trim();
      const day = Number(selectDay.value) || 1;
      const item = { id: uid(), day, thai, meaning, note, createdAt: new Date().toISOString() };
      wordsState.words.push(item);
      // 儲存：若啟用加密，先儲存明文到 memory，再嘗試加密儲存
      saveWordsAccordingToSetting();
      clearForm(); renderWordList();
    }

    clearFormBtn.addEventListener('click', clearForm);
    function clearForm(){ inputThai.value=''; inputMeaning.value=''; inputNote.value=''; inputThai.focus(); }

    let showAll = false;
    function renderWordList(){
      const filterText = (wordSearch.value || '').toLowerCase();
      const selectedDay = Number(selectDay.value);
      currentDayLabel.textContent = selectedDay;
      wordList.innerHTML = '';
      const list = wordsState.words
        .filter(w => showAll ? true : w.day === selectedDay)
        .filter(w => {
          if(!filterText) return true;
          return (w.thai + ' ' + (w.meaning||'') + ' ' + (w.note||'')).toLowerCase().includes(filterText);
        })
        .sort((a,b)=> a.day - b.day || new Date(b.createdAt) - new Date(a.createdAt));

      if(list.length === 0){
        const empty = document.createElement('div'); empty.className='small'; empty.textContent='目前沒有單字';
        wordList.appendChild(empty); return;
      }

      for(const w of list){
        const item = document.createElement('div'); item.className='word-item';
        const left = document.createElement('div');
        const main = document.createElement('div'); main.className='word-main'; main.textContent = w.thai;
        const sub = document.createElement('div'); sub.className='word-sub';
        sub.textContent = `Day ${w.day}` + (w.meaning ? ' · ' + w.meaning : '') + (w.note ? ' · ' + w.note : '');
        left.appendChild(main); left.appendChild(sub);

        const actions = document.createElement('div'); actions.className='word-actions';
        const editBtn = document.createElement('button'); editBtn.className='btn ghost'; editBtn.textContent='編輯';
        const delBtn = document.createElement('button'); delBtn.className='btn'; delBtn.style.background='#ef4444'; delBtn.textContent='刪除';

        editBtn.addEventListener('click', ()=>{
          if(!confirm('編輯會將該筆載入表單，儲存後會新增為新筆，原筆將保留。要繼續嗎？')) return;
          selectDay.value = w.day; currentDayLabel.textContent = w.day;
          inputThai.value = w.thai; inputMeaning.value = w.meaning || ''; inputNote.value = w.note || '';
          inputThai.scrollIntoView({behavior:'smooth',block:'center'});
        });

        delBtn.addEventListener('click', ()=>{
          if(!confirm('確定要刪除此單字？')) return;
          wordsState.words = wordsState.words.filter(x=>x.id !== w.id);
          saveWordsAccordingToSetting(); renderWordList();
        });

        actions.appendChild(editBtn); actions.appendChild(delBtn);
        item.appendChild(left); item.appendChild(actions);
        wordList.appendChild(item);
      }
    }

    showAllWordsBtn.addEventListener('click', ()=>{
      showAll = !showAll;
      showAllWordsBtn.textContent = showAll ? '顯示單日' : '顯示全部';
      renderWordList();
    });
    deleteAllWordsBtn.addEventListener('click', ()=>{
      if(!confirm('確定要刪除單字庫中所有單字？此動作無法還原。')) return;
      wordsState.words = []; saveWordsAccordingToSetting(); renderWordList();
    });
    wordSearch.addEventListener('input', ()=> renderWordList());
    selectDay.addEventListener('change', ()=> renderWordList());

    /* -------------------------
       CSV 匯出（UTF-8 BOM，Excel 可正確開啟）
       ------------------------- */
    function toCsv(rows){
      const esc = v => {
        if(v === null || v === undefined) return '';
        const s = String(v);
        if(s.includes('"') || s.includes(',') || s.includes('\n')) return '"' + s.replace(/"/g,'""') + '"';
        return s;
      };
      return '\uFEFF' + rows.map(r => r.map(esc).join(',')).join('\r\n');
    }
    function download(filename, content, mime='text/csv;charset=utf-8;'){
      const blob = new Blob([content], {type: mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    }

    exportDayCsvBtn.addEventListener('click', ()=> exportCsvForDay(Number(selectDay.value)));
    exportAllCsvBtn.addEventListener('click', exportCsvAll);
    quickExport.addEventListener('click', ()=> exportCsvForDay(Number(selectDay.value)));

    function exportCsvForDay(day){
      const list = wordsState.words.filter(w => w.day === day);
      if(list.length === 0){ alert('該日沒有單字可匯出'); return; }
      const rows = [['Day','泰文','詞義','備註','新增時間']];
      for(const w of list) rows.push([w.day, w.thai, w.meaning || '', w.note || '', new Date(w.createdAt).toLocaleString()]);
      const csv = toCsv(rows);
      download(`thai_words_day${day}.csv`, csv);
    }

    function exportCsvAll(){
      if(wordsState.words.length === 0){ alert('單字庫為空'); return; }
      const rows = [['Day','泰文','詞義','備註','新增時間']];
      const sorted = wordsState.words.slice().sort((a,b)=> a.day - b.day || new Date(a.createdAt) - new Date(b.createdAt));
      for(const w of sorted) rows.push([w.day, w.thai, w.meaning || '', w.note || '', new Date(w.createdAt).toLocaleString()]);
      const csv = toCsv(rows);
      download('thai_words_all.csv', csv);
    }

    /* -------------------------
       本機加密（選用）
       - 使用 Web Crypto API（AES-GCM）對單字庫 JSON 做加密
       - 密碼不會儲存在 localStorage；使用者需在每次解密時輸入密碼
       - 加密流程：deriveKey(PBKDF2) -> AES-GCM encrypt
       - 儲存格式（localStorage under WORDS_KEY）: base64(iv) + ':' + base64(ciphertext) + ':' + base64(salt)
       ------------------------- */
    async function deriveKeyFromPassword(password, saltBuffer){
      const enc = new TextEncoder();
      const keyMaterial = await window.crypto.subtle.importKey(
        'raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']
      );
      return window.crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: saltBuffer, iterations: 200000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt','decrypt']
      );
    }

    function bufToBase64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
    function base64ToBuf(b64){ const bin = atob(b64); const arr = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i); return arr.buffer; }

    async function encryptAndStoreWords(password){
      try {
        const plain = JSON.stringify(wordsState);
        const enc = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKeyFromPassword(password, salt.buffer);
        const cipher = await window.crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plain));
        const payload = bufToBase64(iv) + ':' + bufToBase64(cipher) + ':' + bufToBase64(salt);
        localStorage.setItem(WORDS_KEY, payload);
        // remove plain storage if exists
        localStorage.removeItem(WORDS_KEY_PLAIN);
        alert('單字已加密並儲存於本機');
      } catch(e){
        console.error('加密失敗', e);
        alert('加密失敗：' + (e && e.message ? e.message : '未知錯誤'));
      }
    }

    async function decryptWordsWithPassword(password){
      try {
        const payload = localStorage.getItem(WORDS_KEY);
        if(!payload) { alert('找不到加密資料'); return false; }
        const [ivB64, cipherB64, saltB64] = payload.split(':');
        if(!ivB64 || !cipherB64 || !saltB64) throw new Error('加密資料格式錯誤');
        const iv = base64ToBuf(ivB64);
        const cipher = base64ToBuf(cipherB64);
        const salt = base64ToBuf(saltB64);
        const key = await deriveKeyFromPassword(password, salt);
        const plainBuf = await window.crypto.subtle.decrypt({ name:'AES-GCM', iv: new Uint8Array(iv) }, key, cipher);
        const dec = new TextDecoder();
        const json = dec.decode(plainBuf);
        const obj = JSON.parse(json);
        if(!Array.isArray(obj.words)) throw new Error('資料格式錯誤');
        wordsState = obj;
        // store plain for current session only (not persisted if encryption enabled)
        localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
        renderWordList(); updateWordStats();
        alert('解密成功，單字已載入（本次會話）');
        return true;
      } catch(e){
        console.error('解密失敗', e);
        alert('解密失敗：請確認密碼正確');
        return false;
      }
    }

    // 根據加密設定儲存：若啟用且有密碼，則加密儲存；否則儲存明文
    function saveWordsAccordingToSetting(){
      if(enableEncrypt.checked){
        const pass = encryptPass.value;
        if(!pass){
          // 若使用者勾選加密但未輸入密碼，提示並儲存為明文（避免資料遺失）
          if(!confirm('您已啟用加密但未輸入密碼。是否以明文儲存（不安全）？按「取消」可先輸入密碼再儲存。')) {
            return;
          }
          // fallback: save plain
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          localStorage.removeItem(WORDS_KEY);
          updateWordStats();
          return;
        }
        // perform encryption (async)
        encryptAndStoreWords(pass).then(()=> {
          // after encryption, keep plain in session storage for UI convenience
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          updateWordStats();
        });
      } else {
        // plain save
        localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
        // remove encrypted blob if exists (user opted out)
        localStorage.removeItem(WORDS_KEY);
        updateWordStats();
      }
    }

    // If user toggles encryption off, we keep plain copy but remove encrypted blob
    enableEncrypt.addEventListener('change', ()=>{
      if(enableEncrypt.checked){
        // user enabled encryption: require password to encrypt existing words
        const pass = encryptPass.value;
        if(!pass){
          alert('請在「輸入加密密碼」欄位輸入密碼，然後按新增或儲存以完成加密。');
          return;
        }
        // encrypt current words
        encryptAndStoreWords(pass);
      } else {
        // disable: remove encrypted blob (but keep plain)
        if(confirm('關閉加密會移除本機的加密資料（若存在）。是否繼續？')){
          localStorage.removeItem(WORDS_KEY);
          // ensure plain copy exists
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          alert('已關閉加密，資料以明文儲存（本機）。');
        } else {
          enableEncrypt.checked = true;
        }
      }
    });

    // 解密按鈕行為：若頁面載入時發現加密 blob 且使用者輸入密碼，可按此解密
    encryptPass.addEventListener('change', async ()=>{
      const encrypted = localStorage.getItem(WORDS_KEY);
      if(encrypted && encryptPass.value){
        await decryptWordsWithPassword(encryptPass.value);
      }
    });

    /* -------------------------
       初始化渲染與事件
       ------------------------- */
    function init(){
      renderTable();
      renderWordList();
      updateWordStats();
      if(planState.lastSaved) lastSavedEl.textContent = '最後儲存：' + new Date(planState.lastSaved).toLocaleString();
    }

    // quick actions
    document.getElementById('markAll').addEventListener('click', ()=>{}); // already bound above
    quickAdd.addEventListener('click', ()=> {
      // focus input on mobile
      inputThai.focus();
    });
    quickExport.addEventListener('click', ()=> exportCsvForDay(Number(selectDay.value)));

    // storage event: if other tab modified words, update
    window.addEventListener('storage', (e)=>{
      if(e.key === WORDS_KEY_PLAIN){
        try {
          const obj = JSON.parse(localStorage.getItem(WORDS_KEY_PLAIN) || '{}');
          if(Array.isArray(obj.words)) { wordsState = obj; renderWordList(); updateWordStats(); }
        } catch(e){ /* ignore */ }
      }
      if(e.key === WORDS_KEY){
        // encrypted blob changed; clear plain session to avoid stale data
        // do not auto-decrypt for security
        if(!enableEncrypt.checked){
          // nothing
        } else {
          // prompt user to re-enter password if they want to decrypt
          // do not auto-decrypt
        }
      }
    });

    // keyboard save shortcut (desktop)
    window.addEventListener('keydown', (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's'){
        e.preventDefault();
        savePlanState();
        saveWordsAccordingToSetting();
        alert('已儲存');
      }
    });

    // initial load: if encrypted blob exists, warn user to decrypt
    (function checkEncryptedOnLoad(){
      const encrypted = localStorage.getItem(WORDS_KEY);
      if(encrypted){
        // do not auto-decrypt; ask user to enter password
        alert('偵測到本機有加密的單字資料。若要載入，請在「輸入加密密碼」欄位輸入密碼並按 Enter。');
      }
    })();

    // expose some functions for UI
    window.renderTable = renderTable;
    window.renderWordList = renderWordList;
    window.savePlanState = savePlanState;
    window.saveWordsAccordingToSetting = saveWordsAccordingToSetting;

    // start
    init();
  </script>
</body>
