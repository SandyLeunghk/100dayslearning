<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>100 天泰文 A1 — 手機優化版</title>

  <!-- CSP: 允許內嵌 script nonce 與 Chart.js CDN -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'nonce-3f9b2c7a' 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">

  <script src="https://cdn.jsdelivr.net/npm/chart.js" nonce="3f9b2c7a"></script>

  <style>
    :root{
      --bg1:#fceabb;
      --bg2:#f8b500;
      --card:#fff;
      --accent:#ff8a00;
      --accent-2:#ffb86b;
      --muted:#6b7280;
      --danger:#ff4d4d;
      --radius:12px;
      --gap:12px;
      --shadow: 0 6px 18px rgba(0,0,0,0.08);
      --touch:48px;
    }

    /* Mobile-first base */
    *{box-sizing:border-box}
    html,body{height:100%;min-height:100dvh;margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,Roboto,Arial;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#222;padding:12px;-webkit-font-smoothing:antialiased}
    h1{margin:0 0 8px;color:#fff;text-shadow:0 3px 8px rgba(0,0,0,0.25);font-size:18px}
    .subtitle{color:#fff;opacity:0.95;font-size:13px;margin-top:4px}

    /* Layout: stacked for mobile */
    .wrap{display:flex;flex-direction:column;gap:12px;max-width:980px;margin:0 auto}

    .card{background:var(--card);border-radius:12px;padding:12px;box-shadow:var(--shadow)}
    .top-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .progress{background:rgba(255,255,255,0.6);border-radius:999px;height:10px;overflow:hidden;flex:1}
    .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0%;transition:width .25s}
    .small{font-size:13px;color:var(--muted)}
    .btn{background:var(--accent);color:#fff;border:none;padding:12px;border-radius:10px;font-size:16px;cursor:pointer;min-height:var(--touch);display:inline-flex;align-items:center;justify-content:center}
    .btn.ghost{background:#fff;color:var(--accent);border:1px solid rgba(255,138,0,0.12)}
    .btn.warn{background:var(--danger)}
    .search{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);font-size:16px}

    /* Table simplified for mobile: use list-like rows */
    .plan-list{display:flex;flex-direction:column;gap:8px;max-height:44vh;overflow:auto;padding:4px}
    .plan-item{background:linear-gradient(180deg,#fff,#fff7eb);border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px;justify-content:space-between;border:1px solid rgba(0,0,0,0.04)}
    .plan-left{display:flex;gap:8px;align-items:center}
    .day-pill{background:rgba(255,255,255,0.9);padding:8px 10px;border-radius:999px;font-weight:700}
    .task-text{font-size:14px;color:#111}
    .checkbox{display:flex;align-items:center;gap:8px}

    /* Word bank */
    .vcard{display:flex;flex-direction:column;gap:8px}
    .form-row{display:flex;gap:8px;flex-wrap:wrap}
    input[type="text"], select, textarea, input[type="password"], input[type="number"], input[type="date"]{padding:12px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);font-size:16px}
    textarea{min-height:96px;resize:vertical}
    .word-list{max-height:36vh;overflow:auto;border-radius:10px;border:1px solid rgba(0,0,0,0.06);padding:8px;background:linear-gradient(180deg,#fff,#fff7eb)}
    .word-item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-bottom:1px solid rgba(0,0,0,0.04)}
    .word-main{font-weight:700;font-size:16px}
    .word-sub{font-size:13px;color:var(--muted)}
    .word-actions{margin-left:auto;display:flex;gap:8px}

    /* Reader controls */
    .reader-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
    .reader-controls select{padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);font-size:15px}

    /* Study chart & form */
    .study-wrap{display:flex;flex-direction:column;gap:12px}
    .chart-card{background:var(--card);padding:10px;border-radius:10px;box-shadow:var(--shadow)}
    .form{background:var(--card);padding:12px;border-radius:10px;box-shadow:var(--shadow)}
    .row{display:flex;gap:8px}
    .row> *{flex:1}

    /* Bottom fixed quick bar for mobile */
    .fixed-bar{position:fixed;left:12px;right:12px;bottom:12px;background:linear-gradient(180deg,#fff,#fff7eb);border-radius:14px;padding:8px;display:flex;gap:8px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,0.12);z-index:60}
    .fixed-bar .btn{flex:1;padding:12px;border-radius:10px;font-size:15px}

    /* Larger touch targets on mobile */
    @media(min-width:980px){
      .wrap{display:grid;grid-template-columns:1fr 420px;gap:18px}
      .plan-list{max-height:60vh}
      .word-list{max-height:46vh}
      .fixed-bar{display:none}
    }

    :focus{outline:3px solid rgba(255,138,0,0.18);outline-offset:2px}
  </style>
</head>
<body>
  <div class="wrap">
    <header style="margin-bottom:6px">
      <h1>🌸 100 天泰文 A1</h1>
      <div class="subtitle">手機優化版 — 單字匯出、可選本機加密、朗讀功能</div>
    </header>

    <!-- 左 column (or top on mobile): 計劃表 -->
    <section class="card" aria-label="計劃表">
      <div class="top-row" style="margin-bottom:10px">
        <div style="flex:1;min-width:120px">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
            <div class="small" id="progressText">0 / 100 完成</div>
          </div>
        </div>
        <button class="btn" id="markAll" aria-label="全部完成">全部完成</button>
        <button class="btn ghost" id="clearAll" aria-label="重設">重設</button>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="searchInput" class="search" placeholder="搜尋 Day 或 任務" aria-label="搜尋計劃">
      </div>

      <div class="plan-list" id="planList" role="list" aria-label="100 天計劃清單"></div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <div class="small" id="lastSaved">尚未儲存</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="small">已完成 <strong id="doneCount">0</strong></div>
          <div class="small">剩餘 <strong id="leftCount">100</strong></div>
        </div>
      </div>

      <!-- 朗讀控制（簡潔） -->
      <div style="margin-top:12px">
        <div style="font-weight:700;margin-bottom:6px">朗讀控制</div>
        <div class="reader-controls">
          <button class="btn" id="playAll">播放全部</button>
          <button class="btn ghost" id="pause">暫停</button>
          <button class="btn ghost" id="stop">停止</button>
          <select id="voiceSelect" aria-label="選擇語音"></select>
        </div>
        <div id="readerList" class="small" style="margin-top:8px;color:var(--muted)">選擇 Day 後，按播放朗讀該日單字。</div>
      </div>
    </section>

    <!-- 右 column (or below on mobile): 單字庫 -->
    <aside class="card vcard" aria-label="單字庫">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>單字庫</strong>
          <div class="small">新增 / 編輯 / 匯出（CSV） / 本機加密（選用）</div>
        </div>
        <div class="small" id="totalWords">0 字</div>
      </div>

      <div style="margin-top:10px">
        <div class="form-row" style="margin-bottom:8px">
          <select id="selectDay" aria-label="選擇 Day"></select>
          <input id="inputThai" type="text" placeholder="泰文單字（必填）" inputmode="text" aria-label="泰文單字" />
        </div>

        <div class="form-row" style="margin-bottom:8px">
          <input id="inputMeaning" type="text" placeholder="中文或英文詞義（選填）" aria-label="詞義" />
        </div>

        <div style="margin-bottom:8px">
          <textarea id="inputNote" placeholder="備註（發音、例句）" aria-label="備註"></textarea>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="btn" id="addWordBtn">新增單字</button>
          <button class="btn ghost" id="clearForm">清除</button>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="wordSearch" class="search" placeholder="搜尋單字或備註" aria-label="搜尋單字" />
        </div>

        <div class="word-list" id="wordList" aria-live="polite"></div>

        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <button class="btn ghost" id="showAllWords">顯示全部</button>
          <button class="btn ghost" id="deleteAllWords">刪除全部</button>
          <button class="btn" id="exportDayCsv">匯出當日 CSV</button>
          <button class="btn" id="exportAllCsv">匯出全部 CSV</button>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="small">顯示 Day <span id="currentDayLabel">1</span></div>
          <div style="display:flex;gap:8px;align-items:center">
            <label class="small" for="enableEncrypt">本機加密</label>
            <input id="enableEncrypt" type="checkbox" aria-label="啟用本機加密">
            <input id="encryptPass" type="password" placeholder="輸入加密密碼（短期）" style="padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);font-size:14px">
          </div>
        </div>
      </div>
    </aside>

    <!-- Study chart & record (mobile stacked) -->
    <div class="study-wrap">
      <form id="studyForm" class="form" autocomplete="off">
        <div style="font-weight:700;margin-bottom:8px">學習紀錄</div>
        <label>日期
          <input type="date" id="date" required />
        </label>

        <label style="margin-top:8px">時段
          <select id="session">
            <option value="早上">早上</option>
            <option value="晚上">晚上</option>
          </select>
        </label>

        <div class="row" style="margin-top:8px">
          <label style="flex:1">專注度 (1-5)
            <input type="number" id="focus" min="1" max="5" value="3" />
          </label>
          <label style="flex:1">記憶效果 (1-5)
            <input type="number" id="memory" min="1" max="5" value="3" />
          </label>
        </div>

        <label style="margin-top:8px">語感流暢度 (1-5)
          <input type="number" id="fluency" min="1" max="5" value="3" />
        </label>

        <div class="row" style="margin-top:8px">
          <label style="flex:1">今日重溫字數
            <input type="number" id="rewords" min="0" value="0" />
          </label>
          <label style="flex:1">今日新生字數
            <input type="number" id="words" min="0" value="0" />
          </label>
        </div>

        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn" type="submit">✅ 紀錄</button>
          <button id="clearBtn" class="btn warn" type="button" style="background:linear-gradient(90deg,#ff7b7b,#ff3b3b)">🗑️ 刪除全部</button>
        </div>

        <div style="margin-top:8px;font-size:13px;color:#444">
          提示：只有當「今日新生字數」大於 0 時，才會加入累積生字數。
        </div>
      </form>

      <div class="chart-card">
        <canvas id="studyChart" height="220"></canvas>
      </div>

      <div class="card" style="padding:8px">
        <div style="font-weight:700;margin-bottom:8px">最近紀錄</div>
        <div id="recordList" style="max-height:220px;overflow:auto"></div>
      </div>
    </div>
  </div>

  <!-- 固定快速操作列（手機） -->
  <div class="fixed-bar" role="toolbar" aria-label="快速操作">
    <button class="btn" id="quickAdd">新增單字</button>
    <button class="btn ghost" id="quickExport">匯出當日 CSV</button>
  </div>

  <script nonce="3f9b2c7a">
  'use strict';
  (function () {
    /* -------------------------
       Data & keys
    ------------------------- */
    const PLAN_KEY = 'thai100_progress_v1';
    const WORDS_KEY = 'thai100_words_v1_encrypted';
    const WORDS_KEY_PLAIN = 'thai100_words_v1_plain';
    const KEY_RECORDS = 'thaiStudyRecords_v3';
    const KEY_TOTAL = 'thaiTotalWords_v3';

    let planState = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
    if(!Array.isArray(planState.days) || planState.days.length !== 100){
      planState.days = Array(100).fill(false);
      planState.lastSaved = null;
    }

    let wordsState = { words: [] };
    (function loadWordsOnStart(){
      const encrypted = localStorage.getItem(WORDS_KEY);
      const plain = localStorage.getItem(WORDS_KEY_PLAIN);
      if(plain){
        try { wordsState = JSON.parse(plain); if(!Array.isArray(wordsState.words)) wordsState = { words: [] }; }
        catch(e){ wordsState = { words: [] }; }
      } else if(encrypted){
        wordsState = { words: [] };
      } else {
        wordsState = { words: [] };
      }
    })();

    let records = JSON.parse(localStorage.getItem(KEY_RECORDS) || '[]');
    let totalWords = parseInt(localStorage.getItem(KEY_TOTAL) || '0');

    /* -------------------------
       DOM refs
    ------------------------- */
    const planList = document.getElementById('planList');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const doneCountEl = document.getElementById('doneCount');
    const leftCountEl = document.getElementById('leftCount');
    const lastSavedEl = document.getElementById('lastSaved');
    const searchInput = document.getElementById('searchInput');
    const selectDay = document.getElementById('selectDay');
    const inputThai = document.getElementById('inputThai');
    const inputMeaning = document.getElementById('inputMeaning');
    const inputNote = document.getElementById('inputNote');
    const addWordBtn = document.getElementById('addWordBtn');
    const clearFormBtn = document.getElementById('clearForm');
    const wordList = document.getElementById('wordList');
    const totalWordsEl = document.getElementById('totalWords');
    const currentDayLabel = document.getElementById('currentDayLabel');
    const wordSearch = document.getElementById('wordSearch');
    const showAllWordsBtn = document.getElementById('showAllWords');
    const deleteAllWordsBtn = document.getElementById('deleteAllWords');
    const exportDayCsvBtn = document.getElementById('exportDayCsv');
    const exportAllCsvBtn = document.getElementById('exportAllCsv');
    const quickAdd = document.getElementById('quickAdd');
    const quickExport = document.getElementById('quickExport');
    const enableEncrypt = document.getElementById('enableEncrypt');
    const encryptPass = document.getElementById('encryptPass');

    const playAllBtn = document.getElementById('playAll');
    const pauseBtn = document.getElementById('pause');
    const stopBtn = document.getElementById('stop');
    const voiceSelect = document.getElementById('voiceSelect');

    const dateInput = document.getElementById('date');
    const sessionInput = document.getElementById('session');
    const focusInput = document.getElementById('focus');
    const memoryInput = document.getElementById('memory');
    const fluencyInput = document.getElementById('fluency');
    const newWordsInput = document.getElementById('words');
    const reWordsInput = document.getElementById('rewords');
    const studyForm = document.getElementById('studyForm');
    const recordList = document.getElementById('recordList');
    const clearBtn = document.getElementById('clearBtn');

    /* -------------------------
       Utility
    ------------------------- */
    function uid(){ return 'w_' + Math.random().toString(36).slice(2,9); }
    function savePlanState(){ planState.lastSaved = new Date().toISOString(); localStorage.setItem(PLAN_KEY, JSON.stringify(planState)); lastSavedEl.textContent = '最後儲存：' + new Date(planState.lastSaved).toLocaleString(); }
    function totalWordsElUpdate(){ totalWordsEl.textContent = `${wordsState.words.length} 字`; }

    /* -------------------------
       Tasks for 100 days
    ------------------------- */
    const taskRanges = [
      {from:1,to:5, text:"學 5 個子音，練筆順 + 聽音檔"},
      {from:6,to:10, text:"學 5 個子音，練習組合音"},
      {from:11,to:15, text:"學 5 個母音，練習發音"},
      {from:16,to:20, text:"熟悉 5 種聲調，練習打招呼與自我介紹"},
      {from:21,to:25, text:"學數字 1–100，練習問時間"},
      {from:26,to:30, text:"數字與時間練習，造句表示時間"},
      {from:31,to:35, text:"家庭成員詞彙，造句我有/沒有..."},
      {from:36,to:40, text:"日常動詞（吃、去、看），造句練習"},
      {from:41,to:45, text:"食物詞彙與顏色，認讀菜單常見字"},
      {from:46,to:50, text:"購物用語，模擬問價錢與砍價"},
      {from:51,to:55, text:"交通工具詞彙，學方向與地點詞"},
      {from:56,to:60, text:"問路句型，模擬問路與指路練習"},
      {from:61,to:65, text:"餐廳點餐句型，練習點餐與要求"},
      {from:66,to:70, text:"菜單閱讀與常見料理詞彙練習"},
      {from:71,to:75, text:"常用句型整合：我想要... 我喜歡..."},
      {from:76,to:80, text:"情境對話練習：市場、藥局、車站"},
      {from:81,to:85, text:"閱讀短句與標誌，練習發音與理解"},
      {from:86,to:90, text:"寫作練習：寫 3 個單字與 1 句短句"},
      {from:91,to:99, text:"模擬完整情境：購物、問路、餐廳"},
      {from:100,to:100, text:"Day 100 模擬測驗：自我介紹 + 問路 + 點餐"}
    ];
    function getTaskForDay(d){
      for(const r of taskRanges) if(d>=r.from && d<=r.to) return r.text;
      return "每日複習：字母、詞彙、聽力模仿";
    }

    /* -------------------------
       Render plan list (mobile-friendly)
    ------------------------- */
    function renderPlan(filter=''){
      planList.innerHTML = '';
      for(let i=1;i<=100;i++){
        const done = !!planState.days[i-1];
        const item = document.createElement('div');
        item.className = 'plan-item';
        const left = document.createElement('div'); left.className = 'plan-left';
        const day = document.createElement('div'); day.className = 'day-pill'; day.textContent = 'Day ' + i;
        const task = document.createElement('div'); task.className = 'task-text'; task.textContent = getTaskForDay(i);
        left.appendChild(day); left.appendChild(task);
        const right = document.createElement('div'); right.className = 'checkbox';
        const chk = document.createElement('input'); chk.type = 'checkbox'; chk.checked = done; chk.dataset.day = i; chk.style.width='22px'; chk.style.height='22px';
        chk.addEventListener('change', onToggle);
        right.appendChild(chk);
        item.appendChild(left); item.appendChild(right);

        item.addEventListener('click', (e)=>{
          if(e.target.tagName.toLowerCase() === 'input') return;
          selectDay.value = i; currentDayLabel.textContent = i; renderWordList();
          // scroll to word bank on mobile
          document.querySelector('.vcard').scrollIntoView({behavior:'smooth',block:'center'});
        });

        const rowText = (day.textContent + ' ' + task.textContent).toLowerCase();
        if(filter && !rowText.includes(filter.toLowerCase())) item.style.display='none';
        planList.appendChild(item);
      }
      updateStats();
    }
    function onToggle(e){
      const day = Number(e.target.dataset.day);
      planState.days[day-1] = e.target.checked;
      savePlanState();
      updateStats();
    }
    function updateStats(){
      const doneCount = planState.days.filter(Boolean).length;
      doneCountEl.textContent = doneCount;
      leftCountEl.textContent = 100 - doneCount;
      progressText.textContent = `${doneCount} / 100 完成`;
      progressBar.style.width = (doneCount) + '%';
    }

    /* -------------------------
       Word bank functions
    ------------------------- */
    function renderWordList(){
      const filterText = (wordSearch.value || '').toLowerCase();
      const selectedDay = Number(selectDay.value) || 1;
      currentDayLabel.textContent = selectedDay;
      wordList.innerHTML = '';
      const list = wordsState.words
        .filter(w => w.day === selectedDay)
        .filter(w => {
          if(!filterText) return true;
          return (w.thai + ' ' + (w.meaning||'') + ' ' + (w.note||'')).toLowerCase().includes(filterText);
        })
        .sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
      if(list.length === 0){
        const empty = document.createElement('div'); empty.className='small'; empty.textContent='目前沒有單字';
        wordList.appendChild(empty); return;
      }
      for(const w of list){
        const item = document.createElement('div'); item.className='word-item';
        const left = document.createElement('div');
        const main = document.createElement('div'); main.className='word-main'; main.textContent = w.thai;
        const sub = document.createElement('div'); sub.className='word-sub'; sub.textContent = `Day ${w.day}` + (w.meaning ? ' · ' + w.meaning : '') + (w.note ? ' · ' + w.note : '');
        left.appendChild(main); left.appendChild(sub);
        const actions = document.createElement('div'); actions.className='word-actions';
        const editBtn = document.createElement('button'); editBtn.className='btn ghost'; editBtn.textContent='編輯'; editBtn.style.padding='8px';
        const delBtn = document.createElement('button'); delBtn.className='btn'; delBtn.textContent='刪除'; delBtn.style.background='var(--danger)'; delBtn.style.padding='8px';
        editBtn.addEventListener('click', ()=>{
          if(!confirm('編輯會將該筆載入表單，儲存後會新增為新筆，原筆將保留。要繼續嗎？')) return;
          selectDay.value = w.day; currentDayLabel.textContent = w.day;
          inputThai.value = w.thai; inputMeaning.value = w.meaning || ''; inputNote.value = w.note || '';
          inputThai.scrollIntoView({behavior:'smooth',block:'center'});
        });
        delBtn.addEventListener('click', ()=>{
          if(!confirm('確定要刪除此單字？')) return;
          wordsState.words = wordsState.words.filter(x=>x.id !== w.id);
          saveWordsAccordingToSetting(); renderWordList();
        });
        actions.appendChild(editBtn); actions.appendChild(delBtn);
        item.appendChild(left); item.appendChild(actions);
        wordList.appendChild(item);
      }
    }

    function addWord(){
      const thai = inputThai.value.trim();
      if(!thai){ alert('請輸入泰文單字'); inputThai.focus(); return; }
      const meaning = inputMeaning.value.trim();
      const note = inputNote.value.trim();
      const day = Number(selectDay.value) || 1;
      const item = { id: uid(), day, thai, meaning, note, createdAt: new Date().toISOString() };
      wordsState.words.push(item);
      saveWordsAccordingToSetting();
      clearForm(); renderWordList();
    }
    function clearForm(){ inputThai.value=''; inputMeaning.value=''; inputNote.value=''; inputThai.focus(); }

    function saveWordsAccordingToSetting(){
      if(enableEncrypt.checked){
        const pass = encryptPass.value;
        if(!pass){
          if(!confirm('您已啟用加密但未輸入密碼。是否以明文儲存（不安全）？按「取消」可先輸入密碼再儲存。')) {
            return;
          }
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          localStorage.removeItem(WORDS_KEY);
          totalWordsElUpdate();
          return;
        }
        encryptAndStoreWords(pass).then(()=> {
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          totalWordsElUpdate();
        });
      } else {
        localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
        localStorage.removeItem(WORDS_KEY);
        totalWordsElUpdate();
      }
    }

    /* -------------------------
       CSV export
    ------------------------- */
    function toCsv(rows){
      const esc = v => {
        if(v === null || v === undefined) return '';
        const s = String(v);
        if(s.includes('"') || s.includes(',') || s.includes('\n')) return '"' + s.replace(/"/g,'""') + '"';
        return s;
      };
      return '\uFEFF' + rows.map(r => r.map(esc).join(',')).join('\r\n');
    }
    function download(filename, content, mime='text/csv;charset=utf-8;'){
      const blob = new Blob([content], {type: mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    }
    function exportCsvForDay(day){
      const list = wordsState.words.filter(w => w.day === day);
      if(list.length === 0){ alert('該日沒有單字可匯出'); return; }
      const rows = [['Day','泰文','詞義','備註','新增時間']];
      for(const w of list) rows.push([w.day, w.thai, w.meaning || '', w.note || '', new Date(w.createdAt).toLocaleString()]);
      const csv = toCsv(rows);
      download(`thai_words_day${day}.csv`, csv);
    }
    function exportCsvAll(){
      if(wordsState.words.length === 0){ alert('單字庫為空'); return; }
      const rows = [['Day','泰文','詞義','備註','新增時間']];
      const sorted = wordsState.words.slice().sort((a,b)=> a.day - b.day || new Date(a.createdAt) - new Date(b.createdAt));
      for(const w of sorted) rows.push([w.day, w.thai, w.meaning || '', w.note || '', new Date(w.createdAt).toLocaleString()]);
      const csv = toCsv(rows);
      download('thai_words_all.csv', csv);
    }

    /* -------------------------
       Encryption (Web Crypto API)
    ------------------------- */
    async function deriveKeyFromPassword(password, saltBuffer){
      const enc = new TextEncoder();
      const keyMaterial = await window.crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
      return window.crypto.subtle.deriveKey({ name: 'PBKDF2', salt: saltBuffer, iterations: 200000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt','decrypt']);
    }
    function bufToBase64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
    function base64ToBuf(b64){ const bin = atob(b64); const arr = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i); return arr.buffer; }

    async function encryptAndStoreWords(password){
      try {
        const plain = JSON.stringify(wordsState);
        const enc = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKeyFromPassword(password, salt.buffer);
        const cipher = await window.crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plain));
        const payload = bufToBase64(iv) + ':' + bufToBase64(cipher) + ':' + bufToBase64(salt);
        localStorage.setItem(WORDS_KEY, payload);
        localStorage.removeItem(WORDS_KEY_PLAIN);
        alert('單字已加密並儲存於本機');
      } catch(e){
        console.error('加密失敗', e);
        alert('加密失敗：' + (e && e.message ? e.message : '未知錯誤'));
      }
    }

    async function decryptWordsWithPassword(password){
      try {
        const payload = localStorage.getItem(WORDS_KEY);
        if(!payload) { alert('找不到加密資料'); return false; }
        const [ivB64, cipherB64, saltB64] = payload.split(':');
        if(!ivB64 || !cipherB64 || !saltB64) throw new Error('加密資料格式錯誤');
        const iv = base64ToBuf(ivB64);
        const cipher = base64ToBuf(cipherB64);
        const salt = base64ToBuf(saltB64);
        const key = await deriveKeyFromPassword(password, salt);
        const plainBuf = await window.crypto.subtle.decrypt({ name:'AES-GCM', iv: new Uint8Array(iv) }, key, cipher);
        const dec = new TextDecoder();
        const json = dec.decode(plainBuf);
        const obj = JSON.parse(json);
        if(!Array.isArray(obj.words)) throw new Error('資料格式錯誤');
        wordsState = obj;
        localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
        renderWordList(); totalWordsElUpdate();
        alert('解密成功，單字已載入（本次會話）');
        return true;
      } catch(e){
        console.error('解密失敗', e);
        alert('解密失敗：請確認密碼正確');
        return false;
      }
    }

    enableEncrypt.addEventListener('change', ()=>{
      if(enableEncrypt.checked){
        const pass = encryptPass.value;
        if(!pass){
          alert('請在「輸入加密密碼」欄位輸入密碼，然後按新增或儲存以完成加密。');
          return;
        }
        encryptAndStoreWords(pass);
      } else {
        if(confirm('關閉加密會移除本機的加密資料（若存在）。是否繼續？')){
          localStorage.removeItem(WORDS_KEY);
          localStorage.setItem(WORDS_KEY_PLAIN, JSON.stringify(wordsState));
          alert('已關閉加密，資料以明文儲存（本機）。');
        } else {
          enableEncrypt.checked = true;
        }
      }
    });

    encryptPass.addEventListener('change', async ()=>{
      const encrypted = localStorage.getItem(WORDS_KEY);
      if(encrypted && encryptPass.value){
        await decryptWordsWithPassword(encryptPass.value);
      }
    });

    /* -------------------------
       Speech synthesis (朗讀)
    ------------------------- */
    let synth = window.speechSynthesis;
    function populateVoices(){
      const voices = synth.getVoices();
      voiceSelect.innerHTML = '';
      voices.forEach(v=>{
        const opt = document.createElement('option'); opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(opt);
      });
    }
    populateVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;

    function speakTextList(list){
      if(!list || list.length===0) { alert('沒有要朗讀的單字'); return; }
      synth.cancel();
      const voiceName = voiceSelect.value;
      const voices = synth.getVoices();
      const voice = voices.find(v=>v.name===voiceName) || null;
      for(const w of list){
        const u = new SpeechSynthesisUtterance(w.thai);
        if(voice) u.voice = voice;
        u.rate = 0.9;
        synth.speak(u);
      }
    }
    playAllBtn.addEventListener('click', ()=>{
      const selectedDay = Number(selectDay.value) || 1;
      const list = wordsState.words.filter(w=>w.day===selectedDay);
      speakTextList(list);
    });
    pauseBtn.addEventListener('click', ()=> { if(synth.speaking) synth.pause(); });
    stopBtn.addEventListener('click', ()=> { if(synth.speaking) synth.cancel(); });

    /* -------------------------
       Study chart (Chart.js) & records
    ------------------------- */
    (function setToday(){
      const t = new Date();
      const yyyy = t.getFullYear();
      const mm = String(t.getMonth()+1).padStart(2,'0');
      const dd = String(t.getDate()).padStart(2,'0');
      const dateInput = document.getElementById('date');
      if(dateInput) dateInput.value = `${yyyy}-${mm}-${dd}`;
    })();

    const ctx = document.getElementById('studyChart').getContext('2d');
    const studyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: '早上平均分', data: [], borderColor: '#0077ff', backgroundColor: 'rgba(0,119,255,0.08)', tension:0.25, yAxisID:'y1' },
          { label: '晚上平均分', data: [], borderColor: '#ff8a00', backgroundColor: 'rgba(255,138,0,0.08)', tension:0.25, yAxisID:'y1' },
          { label: '累積生字數', data: [], borderColor: '#28c76f', backgroundColor: 'rgba(40,199,111,0.06)', tension:0.25, yAxisID:'y2' }
        ]
      },
      options: {
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index', intersect:false},
        scales: {
          y1: { type:'linear', position:'left', suggestedMin:0, suggestedMax:5, title:{display:true, text:'平均分 (1-5)'} },
          y2: { type:'linear', position:'right', grid:{drawOnChartArea:false}, title:{display:true, text:'累積生字數'} }
        },
        plugins: { legend:{position:'top'} }
      }
    });

    function renderRecords(){
      studyChart.data.labels = [];
      studyChart.data.datasets.forEach(ds => ds.data = []);
      recordList.innerHTML = '';
      records.forEach(r => {
        r.focus = Number(r.focus) || 0;
        r.memory = Number(r.memory) || 0;
        r.fluency = Number(r.fluency) || 0;
        r.newWords = Number(r.newWords) || 0;
        r.reWords = Number(r.reWords) || 0;
        r.totalWords = Number(r.totalWords) || 0;
        if (!studyChart.data.labels.includes(r.date)) studyChart.data.labels.push(r.date);
        const avg = (r.focus + r.memory + r.fluency) / 3;
        const morningDs = studyChart.data.datasets.find(d => d.label === '早上平均分');
        const nightDs = studyChart.data.datasets.find(d => d.label === '晚上平均分');
        const wordDs = studyChart.data.datasets.find(d => d.label === '累積生字數');
        if (r.session === '早上') morningDs.data.push(avg);
        else nightDs.data.push(avg);
        wordDs.data.push(r.totalWords);

        // add to record list (newest first)
        const div = document.createElement('div'); div.style.padding='8px'; div.style.borderBottom='1px solid rgba(0,0,0,0.04)';
        div.innerHTML = `<div style="font-weight:700">${r.date} ${r.session}</div><div style="font-size:13px;color:var(--muted)">專注 ${r.focus} · 記憶 ${r.memory} · 語感 ${r.fluency} · 新生字 ${r.newWords} · 累積 ${r.totalWords}</div>`;
        recordList.prepend(div);
      });
      studyChart.update();
    }
    renderRecords();

    studyForm.addEventListener('submit', function(e){
      e.preventDefault();
      const date = document.getElementById('date').value;
      const session = sessionInput.value;
      const focus = Number(focusInput.value) || 0;
      const memory = Number(memoryInput.value) || 0;
      const fluency = Number(fluencyInput.value) || 0;
      const newWords = Number(newWordsInput.value) || 0;
      const reWords = Number(reWordsInput.value) || 0;
      if (newWords > 0) totalWords += newWords;
      const now = new Date();
      const timestamp = now.toLocaleString();
      const record = { date, session, focus, memory, fluency, newWords, reWords, totalWords, time: timestamp };
      records.push(record);
      localStorage.setItem(KEY_RECORDS, JSON.stringify(records));
      localStorage.setItem(KEY_TOTAL, String(totalWords));
      renderRecords();
      newWordsInput.value = 0; reWordsInput.value = 0;
      const notice = document.createElement('div'); notice.className='card'; notice.style.position='fixed'; notice.style.right='12px'; notice.style.bottom='80px'; notice.style.padding='10px'; notice.style.zIndex='9999'; notice.textContent = '✅ 已紀錄：' + timestamp;
      document.body.appendChild(notice); setTimeout(()=> notice.remove(), 1400);
    });

    clearBtn.addEventListener('click', function(){
      if (!confirm('⚠️ 確定要刪除全部紀錄並重置累積生字數嗎？')) return;
      localStorage.removeItem(KEY_RECORDS);
      localStorage.removeItem(KEY_TOTAL);
      records = []; totalWords = 0;
      studyChart.data.labels = []; studyChart.data.datasets.forEach(ds => ds.data = []); studyChart.update();
      recordList.innerHTML = '';
      const notice = document.createElement('div'); notice.className='card'; notice.style.position='fixed'; notice.style.right='12px'; notice.style.bottom='80px'; notice.style.padding='10px'; notice.style.zIndex='9999'; notice.textContent = '🗑️ 已刪除全部紀錄';
      document.body.appendChild(notice); setTimeout(()=> notice.remove(), 1200);
    });

    /* -------------------------
       Event bindings
    ------------------------- */
    document.getElementById('markAll').addEventListener('click', ()=>{ if(!confirm('確定要將所有天數標為完成嗎？')) return; planState.days = planState.days.map(()=>true); savePlanState(); renderPlan(searchInput.value.trim()); });
    document.getElementById('clearAll').addEventListener('click', ()=>{ if(!confirm('確定要重設所有打卡紀錄？')) return; planState.days = planState.days.map(()=>false); savePlanState(); renderPlan(searchInput.value.trim()); });
    searchInput.addEventListener('input', (e)=> renderPlan(e.target.value.trim()));

    addWordBtn.addEventListener('click', addWord);
    quickAdd.addEventListener('click', ()=> { inputThai.focus(); });
    quickExport.addEventListener('click', ()=> exportCsvForDay(Number(selectDay.value)));
    exportDayCsvBtn.addEventListener('click', ()=> exportCsvForDay(Number(selectDay.value)));
    exportAllCsvBtn.addEventListener('click', exportCsvAll);
    showAllWordsBtn.addEventListener('click', ()=>{ /* mobile simplified: toggle all days */ const currently = showAllWordsBtn.textContent === '顯示全部'; showAllWordsBtn.textContent = currently ? '顯示全部' : '顯示單日'; /* keep behavior simple: always show selected day */ renderWordList(); });
    deleteAllWordsBtn.addEventListener('click', ()=>{ if(!confirm('確定要刪除單字庫中所有單字？此動作無法還原。')) return; wordsState.words = []; saveWordsAccordingToSetting(); renderWordList(); });

    wordSearch.addEventListener('input', ()=> renderWordList());
    selectDay.addEventListener('change', ()=> renderWordList());
    clearFormBtn.addEventListener('click', clearForm);

    window.addEventListener('storage', (e)=>{
      if(e.key === WORDS_KEY_PLAIN){
        try {
          const obj = JSON.parse(localStorage.getItem(WORDS_KEY_PLAIN) || '{}');
          if(Array.isArray(obj.words)) { wordsState = obj; renderWordList(); totalWordsElUpdate(); }
        } catch(e){ /* ignore */ }
      }
    });

    window.addEventListener('keydown', (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's'){
        e.preventDefault();
        savePlanState();
        saveWordsAccordingToSetting();
        alert('已儲存');
      }
    });

    (function checkEncryptedOnLoad(){
      const encrypted = localStorage.getItem(WORDS_KEY);
      if(encrypted){
        // gentle prompt for mobile
        if(confirm('偵測到本機有加密的單字資料。要輸入密碼以載入嗎？')) {
          const p = prompt('請輸入加密密碼（短期）');
          if(p) decryptWordsWithPassword(p);
        }
      }
    })();

    /* -------------------------
       Init
    ------------------------- */
    // populate day select
    for(let i=1;i<=100;i++){
      const opt = document.createElement('option'); opt.value = i; opt.textContent = 'Day ' + i;
      selectDay.appendChild(opt);
    }

    function init(){
      renderPlan();
      renderWordList();
      totalWordsElUpdate();
      if(planState.lastSaved) lastSavedEl.textContent = '最後儲存：' + new Date(planState.lastSaved).toLocaleString();
    }
    init();
  })();
  </script>
